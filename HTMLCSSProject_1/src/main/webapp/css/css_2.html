<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
#red{
	color:red;
}
#orange {
	color:orange;
}
/* 
	#, . 이 없는 경우 => 태그로 인식
 */
#gray {
	color:gray;
}
.blue {
	color:blue;
}
.green {
	color:green;
}
</style>
</head>
<body>
	<!-- id, class 속성은 태그를 구분해서 CSS적용 / JavaScript로 제어 -->
	<!-- 중복이 없는 경우 : ID 설정 -->
	<!-- red -->
	<h1 id="red">Java</h1>
	<!-- orange -->
	<h1 id="orange">Oracle</h1>
	<!-- 중복이 있는 경우 : class 설정 -->
	<!-- blue -->
	<h1 class="blue">HTML/CSS</h1>
	<!-- blue -->
	<h1 class="blue">JavaScript</h1> <!-- Vue, React 라이브러리 -->
	<!-- green -->
	<h1 class="green">JSP</h1>
	<!-- green -->
	<h1 class="green">Spring</h1>
	<!-- gray -->
	<h1 id="gray">CI/CD</h1><!-- 서버 : AWS -->
	
</body>
</html>
