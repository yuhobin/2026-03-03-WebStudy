<!-- 
	선택자 : 태그를 가지고 와서 CSS이용한 디자인
			--------
			어떤 태그에 적용할지 (원하는 태그를 선택해서 디자인)
	기본 선택자
		1) 태그명 ==> 유사한 태그가 많이 존재
			태그명 {
			
			}
		-----------
		2) 아이디명 : 중복없이 지정
			#아이디명{
			
			}
		3) 클래스명 : 중복이 가능
			.클래스명{
			
			}
		-----------
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
/* 태그명으로 제어 : 공통적으로 적용되는 부분 */
img {
	width: 150px;
	height: 250px;
}
.red {
	border:5px solid red;
	opacity: 0.3 /* 투명 : 0.0 ~ 1.0 */
}
#green {
	border:5px solid green; /* ;으로 구분 */
	border-radius: 100px;
	/* 10px 10px 10px 10px */
}
</style>
</head>
<body>
	<img src="../images/m1.jpg">
	<img src="../images/m2.jpg" class="red"> <!-- 테두리 : red -->
	<img src="../images/m3.jpg">
	<img src="../images/m4.jpg" class="red"> <!-- 테두리 : red -->
	<img src="../images/m5.jpg">
	<img src="../images/m6.jpg" class="red"> <!-- 테두리 : red -->
	<img src="../images/m7.jpg" id="green">
</body>
</html>
