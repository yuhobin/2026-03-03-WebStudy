<!-- 
	CSS의 핵심
	=> 선택자
	후손 선택자 / 자손 선택자 / 동위 선택자
	--------   -------   --------
	태그 태그     태그 > 태그  태그+태그 / 태그~태그
	
	예) 
		<div>
			<p></p>
			<h1></h1>
			<h1></h1>
			<span>
				<h1></h1>
			</span>
		</div>
		
			div
			 |
	  -----------------------
	  |		|		|		|
	  p		h1		h1	   span ==> 자손  div > p,  div > h1
	  						|
	  						h1 ==> 후손 div span h1
	  가장 근접 : p+h1, p~h1
	  -------------------- table, ul, ol, dl
	  <th>+<td>
	  
	  => id/class : 구분자
	  => 태그를 선택해 온다
	  => 웹 개발자 => 데이터를 출력
	  				-------- 퍼블리셔가 디자인을 해준다
	  => CSS의 장점
	  	HTML을 다 출력하고 나중에 CSS대입이 가능
	  
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
p {
	color:red;
}
div > h1 {
	color:blue;
}
div span  h1 {
	color:green;
}
div > p+h1 {
	color:orange;
}
div > p~h1 {
	color:orange;
}
</style>
</head>
<body>
	<div> <!-- 분할, 태그를 모아서 관리 (JPanel) -->
		<p>Hello Java</p> <!-- red -->
		<h1>Hello Oracle</h1>
		<h1>Hello JSP</h1> <!-- blue -->
		<span>
			<h1>Hello Spring</h1> <!-- green -->
		</span>
	</div>
</body>
</html>
