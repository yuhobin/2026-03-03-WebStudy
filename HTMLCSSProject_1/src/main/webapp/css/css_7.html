<!-- 
	반응 선택자
		=> hover(***)
			=> mouseover
		=> button / img / a / tr
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
img {
	width: 160px;
	height: 250px;
}
img:hover{
	opacity: 0.3;
	cursor: pointer;
	border:3px solid green
}
a {
	display: block;
	color:black;
	text-decoration: none;
}
a:hover{
	color:#999;
}
table /thead>tr {
	background-color: orange;
}
table > tbody > tr:hover {
	background-color: #FC9;
}
/* 
	반응 선택자
		=> hover (***)
				=> mouseover
		=> button / img / a / tr
		
	=> 126~127page
		선택자의 종류 (태그를 찾아온다)
					찾은 태그에 대해서 => CSS적용
					
	1. HTML
	2. HTML 태그 찾기 : 선택자
	3. CSS 속성
		=> 텍스트관련
		=> Background 관련
		=> 가시성
		=> 박스 모델 : 간격 조절 : margin / border / padding 
		=> 위치 속성 : 절대 좌표 / 상대 좌표
		=> 레이아웃
		=> 반응형 
		=> Gemini => CSS
	4. JavaScript => 동적
	5. JSP : 오라클 연결 => MyBatis / JPA
		=> MVC
	6. SpringFramework
	7. SpringBoot ==> JWT / WebSocket(Stormp)
	8. AWS, CI/CD
	-------------------------------
	NodeJS , React, VueJS	
 */
</style>
</head>
<body>
	<img src="../images/m1.jpg">
	<img src="../images/m2.jpg">
	<img src="../images/m3.jpg">
	<img src="../images/m4.jpg">
	<img src="../images/m5.jpg">
	<img src="../images/m6.jpg">
	<img src="../images/m7.jpg">
