table thead tr:first-child {
	background: orange;

/* 1 2 3 ... 2 4 6 */
table tbody tr:nth-child(2n) {
	background: rgb(255, 255, 220)
}
/* 2 6 10 ... n은 0부터 대입*/
table tbody tr:nth-child(4n+2) {
	background: cyan;
}
/* 3 7 11 */
table tbody tr:nth-child(4n+3) {
	background: green
}
/* 4 8 12 */
table tbody tr:nth-child(4n+4) {
