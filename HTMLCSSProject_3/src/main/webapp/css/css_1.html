<!-- 
	1. 선택자
	2. 속성
	3. 실제 연습
	
	속성
	1) 박스 속성 : margin / padding / border
	2) 가시 속성 : display / overflow 
	3) 배경 속성 : background (color / image)
	4) 위치 속성 : 절대좌표, 상대좌표, 있는 그대로, 고정 
	5) 유동 속성 : float / z-index
	----------------------------------------
	반응형 => Layout (HTML5 시멘택 태그 => header / section footer nav aside)
			카드 : Flex, Grid 
	----------------------------------------
	
	박스 속성
	
	------------------------------
	margin : 외부 여백 지정
	-------------------------------
	border : 테두리
	-------------------------------
		padding : 내부 여백 지정
		-----------------
			Content: 이미지 / 문자 ...
		-----------------
	
	        margin : top right bottom left 
                 시계방향 
        속기법 
          margin : 10px 
                   => 10px 10px 10px 10px 
          margin : 10px 20px 
                   => 10px 20px 10px 20px
          margin : 10px 20px 30px 
                   => 10px 20px 30px 20px 
                       |         |
                       -----------
                              |        |
                              ----------
		
	가운데 정렬 : margin: 0px auto => 자동 정렬
	
	=> 한개씩 사용
		margin-top : 위 아래 간격 
		margin-right : 좌우 간격
		margin-bottom
		margin-left
 -->

input {
	margin-top: 20px;
	display: block;

</head>
<body>

	<input type=text size=30>
	<input type=text size=30>

</html>
