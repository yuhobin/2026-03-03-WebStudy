<!-- 
	=> 선택자 (태그)
	속성 : CSS에서 제공하는 속성(163page)
	1. 박스 속성
		외부 간격 : margin
		=> margin-top : 위에서 간격 조절
		=> margin-right
		=> margin-bottom
		=> margin-left : 대댓글
		=> margin : top right bottom left
			예) margin: 10px;
						10px 10px 10px 10px
				margin : 10px 2px
						 10px 20px 10px 20px 
				margin : 10px 20px 30px
						 10px 20px 30px 20px
						 		|		|
						 		---------
						 	|		| 
						 	---------
		=> 태그 / 태그 사이의 간격
		=> 버튼 여러개 출력 -> 간격
		=> margin-top / margin-left
		=> margin: 0px auto; => 가운데 정렬				
		내부 간격 조절 : padding => 태그안의 글자 / 이미지 여백
								<th>, <td>
								
		외부 간격 : padding
		=> padding-top : 위에서 간격 조절
		=> padding-right
		=> padding-bottom
		=> padding-left : 대댓글
		=> padding : top right bottom left
			예) padding: 10px;
						10px 10px 10px 10px
				padding : 10px 2px
						 10px 20px 10px 20px 
				padding : 10px 20px 30px
						 10px 20px 30px 20px
						 		|		|
						 		---------
						 	|		| 
						 	---------
		테두리 : border
			= border-width : 테두리 두께
			= border-style : solid / dotted / dashed / double
			= border-color : 테두리 색상
			= border : width style color
			= border-radius: 타원형
							top-reft top-right bottom-right bottom-left
	2. 가시 속성
		display : inline / block
		태그는 inline (가로) / block (세로)
			System.out.print() / System.out.println()
			block : 브라우저 한줄 전체를 차지
				= <h1> ~ <h6> , <br>, <p>
					<ul> <ol> <dl> <table>
					<div>
				inline : 자동으로 해당 크기만큼 처리 (가로)
					= <img> <a> 글자(<b>, <strong>, <font> , <sup>)
					= <span>, <input> <select> <textarea>
			display: block => inline을 block으로 변경
			
			<table> 사용하지 않는 것을 권장
			-------------------------
			<table> : display:table
			<tr> : display:table-row
			<td> : display:table-cell
			<th> : display:table-column
			---------------------------- 테이블 디자인
	3. 배경 속성
		background
			=> background-color : 색상
								  ---
								  시스템 색상 => red / blue ...
								  HEX : #CCCCCC(16진법)
								  rgb(255,255,255)
								  rgba(255,255,255,0.1) : 투명
								  				   ----
								  				   	0.0 ~ 1.0
			=> background-image : 이미지 출력
				=> 위에 문자가 가능
				=> background-image : url('이미지 경로')
				=> background-size: 이미지 크기
				=> background:color 지정 / 이미지 설정 / 크기 설정
			
	4. 텍스트 속성
		font / text
	5. 위치 속성
		position
			= static
			= absolute : 절대좌표
			= relative
			= fixed
	6. 유동 속성
		float / z-index
	--------------
	7. 레이아웃 + 시멘텍 태그
		flex / grid
		header / section / nav / footer / aside : 화면 구도
		-------------------------
		로고 		검색시 => header
		-------------------------
				메뉴	=> nav
		-------------------------
		로그인	|
		광고		|	실제 출력물 => section
				|
				|
		-------------------------
		개인 정보 방침 / 회사 정보 => footer
		-------------------------
	8. 반응형
		media 태그 => 해상도에 따라 화면 출력이 다르게 만든다
		| 반응형 => CSS가 어렵다
		| 사이트 + 모바일
				----- Kotlin(안드로이드) / Swift(아이폰)
						|				  |
						------------------- 플루터
				----- React Native
	9. BootStrap / TailWind : CSS 라이브러리 
				   -------- 많이 사용
 -->
<!DOCTYPE html>
