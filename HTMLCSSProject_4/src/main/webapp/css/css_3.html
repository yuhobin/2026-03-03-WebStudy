<!-- 가시 속성 : display -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
img {
	display: block;
	width: 150px;
	height: 200px;
	margin-top: 10px;
}
div{
	width: 100px;
	height: 100px;
	background-color: red;
	display: inline-block; /* width/height가 있는 경우  */
	margin-left: 10px;
}
</style>
</head>
<body>
	<img src="../images/m1.jpg">
	<img src="../images/m2.jpg">
	<img src="../images/m3.jpg">
	<img src="../images/m4.jpg">
	<img src="../images/m5.jpg">
	<div></div>
	<div></div>
	<div></div>
</body>
</html>
