<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="table.css">
<style type="text/css">
	h3 {
		text-align: center;
	}
	table {
		margin: 0px auto;
	}
</style>
</head>
<!-- 
	<table id="table_content" width="700">
 -->
<body>
	<h3>내용보기</h3>
	<table id="table_content" width=700>
		<tbody>
			<tr>
				<th width="20%">번호</th>
				<td width="30%">1</td>
				<th width="20%">작성일</th>
				<td width="30%">2026-05-08</td>
			</tr>
			<tr>
				<th width="20%">이름</th>
				<td width="30%">홍길동</td>
				<th width="20%">조회수</th>
				<td width="30%">10</td>
			</tr>
			<tr>
				<th width="20%">제목</th>
				<td colspan="3">Table 연습(colspan:가로로 묶는 연습)</td>
			</tr>
			<tr>
				<td colspan="4" valign="top" height="200">
				Table 연습(colspan:가로로 묶는 연습)<br>
				Table 연습(rowspan:가로로 묶는 연습)
				</td>
			</tr>
			<tr>
				<td colspan="4" align="right">
				<a href="javascript;history.back()">목록</a>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
