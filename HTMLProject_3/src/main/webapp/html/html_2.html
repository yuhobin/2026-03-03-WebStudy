<!-- 
	로그인
	회원가입
	게시판 글쓰기
	=> fieldset, label, figcaption
	=> map, area
	=> div / span (CSS)
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<!-- 이미지 카드 -->
	<figure><!-- 이미지+내용 -->
		<img src="m1.jpg" width="250" height="300">
		<figcaption>어린 나이에 형제들과 ‘잭슨 파이브’ 그룹의 막내로 데뷔하자마자
음악적 천재성과 스타성으로 주목을 받은 ‘마이클 잭슨’.
전세계적인 스타로 성공하지만, 그는 가족에 대한 책임감과 자신의 음악적 정체성 사이에서
고민에 빠지게 된다.
천재적인 뮤지션에서 시대를 초월한 아이콘이 되기까지, 그의 무대를 극장에서 확인하라!
		</figcaption>
		<hr>
		<!-- table => fieldset 사용 권장
			웹 접근성 => 관련된 입력을 하나로 묶어서 사용
			legend 사용
		 -->
		<fieldset> <!-- 입력 창 그룹 -->
			<legend>회원 정보</legend> <!-- 그룹 제목 -->
			<label for="name">이름</label> <!-- 입력 필드 설명 -->
			<input type=text id="name" name="name">
			<p>
			<label for="email">이메일</label>
			<input type=text id="email" name="email">
			<p>
			<label>
				<input type="radio">남자
			</label>
			<label>
				<input type="radio">여자
			</label>
		</fieldset>
	</figure>
	
	
</body>
</html>
