<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="table.css"><!-- import -->
<style type="text/css">
h3 {
  text-align: center;
}
table {
  margin: 0px auto;
}
</style>
</head>
<body>
	<h3>글쓰기</h3>
	<table id="table_content" width="600">
		<tbody>
			<tr>
				<th width=20%>이름</th>
				<td width=80%><input type="text" size=15></td>
			</tr>
			<tr>
				<th width=20%>이메일</th>
				<td width=80%><input type="text" size=35></td>
			</tr>
			<tr>
				<th width=20%>제목</th>
				<td width=80%><input type="text" size=35></td>
			</tr>
			<tr>
				<th width=20%>내용</th>
				<td width=80%>
					<textarea rows="10" cols="38"></textarea>
				</td>
			</tr>
			<tr>
				<th width=20%>첨부파일</th>
				<td width=80%><input type=file size=20></td>
			</tr>
			<tr>
				<th width=20%>비밀번호</th>
				<td width=80%><input type=password size=10></td>
			</tr>
			<tr>
				<td colspan="2" align="center">
					<input type="submit" value="글쓰기">
					<input type="button" value="취소">
				</td>
			</tr>
			
		</tbody>
	</table>
</body>
</html>
