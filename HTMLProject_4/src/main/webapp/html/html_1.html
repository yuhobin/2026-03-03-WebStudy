				웹 동작
				-----
				1) C(client) / S(server) 구조
					=> Server에서 지시한 내용을 화면에 출력
					Client : 브라우저에서 요청(Request)을 보낸다
							 ------- 주소창을 통해서 요청
					HTML / CSS / JavaScropt
					----------------------------------------- Front
					Server : 요청을 받아서 처리 후에 응답 (HTML로 전송)
					Java / Oracle / Spring
					----------------------------------------- Back
				2) HTML의 역할
					=> 정적페이지 (파일 => 페이지)
						=> 데이터를 변경할 수 없다
					=> 동적페이지 : JSP / PHP / ASP / DJango
												  ------- 파이썬 기반
											---- C#기반
								---- Java기반
						| 자바스크립트 : Ajax, Vue, React
				3) 동작 방법
					=> 인터프리터 (한줄씩 읽어서 출력) => 문법상의 오류는 없다
						: 에러 출력이 없다 (HTML문서를 브라우저에 올린다 => 태그를 번역 => 화면 출력)
				4) 웹서버에서 오류
					404	: 파일명이 틀린경우
					500 : 자바와 연동 => 자바오류
					403 : 접근거부
					412 / 415 / 400 => JSP와 연동
				5) HTML / CSS => Only 화면 UI => 기능이 없다
					=> 사용자 정의가 없다 => 이미 만들어져 있다 (응용이 없다)
					=> 표준화 (모든 개발자가 동일하게 사용)
					=> 퍼블리셔 => 화면 UI
					=> 어떤 모양 / 약간의 CSS변경
				6) HTML의 태그의 종류
					1. 여는 태그 / 닫는 태그
						<h1>내용</h1> 
					2. 독립태그
						<br>, <img>, <input>
							 --------------- : 속성값으로 출력
					3. 
						<h1>내용</h1>
							---
						<img src="출력할 이미지">
								 -----------
					4. 형식 
						<!DOCTYPE html> : 버전에 맞는 HTML 정의 문서를 읽어 온다
						<html>
							<head>
								<meta> : 한글 변환 => UTF-8 / EUC-KR
													| 리눅스 호환
								<script> : 자바스크립트 : 사용자 요청에 따라 => 브라우저 안에서
								<style> : 화면 UI => CSS 
								<link> : CSS 파일 읽기
								<title> : 브라우저 제목

							</head>
							<body>
								=> 태그 => 브라우저 출력하는 태그
							</body>
						</html>
			51page => HTML 태그
					  ML => MarkUp Language
					  -- <> 태그 + 속성
					  -- <img src="">
					  	  --- --------
					  	  태그  속성
					  	  	   --- 필요시에는 사용자 정의 속성이 가능
					  	  	   --- Jquery / Ajax / VueJS / ReactJS
					  	  	   --- 데이터 보관
					  	  --- 사용자 정의가 없다 => 있는 그대로 사용
					  -- 태그 / 속성 (4버전) => 대소문자 구분없이 사용
					  -- 5버전 : 소문자만 사용
			1. 내용을 가지고 있는태그
				<h1>내용</h1> => <h1>~<h6>
				<p>내용</p>, 목록(ul, ol, table, dl), 텍스트 관련(b, i, font...)
			2. 내용이 없는 태그
				닫는 태그가 없는 경우 (img, input, br, hr...)
				
			---------------------------------------------------
			1. 태그의 종류
				1) 문자 태그 
					문장안에서 텍스트의 의미, 강조 등의 표현하는 태그
					=> 글 콘텐츠 구성 (블로그, 기사, 설명문)
											 ----- 상세 보기 
					=> 중요도 전달(경고, 안내)
					=> 검색 / 접근성
					=> 보여주는 것 / 의미 전달
					=> 주요 태그
						<br> : 다음줄에 출력 => \n
						<p> : 단락을 나눠서 사용
						<strong> : bold => 강조
						<h1>~<h6> : 제목 (h1, h3)
						<sup> : 위첨자 => new
						<hr> : 구분선 => 라인선	
						<pre> : 있는 그대로 출력 => 상세보기, 줄거리, 자소서
						----- 스타일 적용
						----- <pre style="white-space:pre-wrap">
							  ----------------------------------
							  | => 자동 줄바꿈
					=> 속성
						모든 태그의 속성 : id, class, style
									  ---------   -----
									  				| 태그만 CSS를 적용
									  | 구분자 : CSS, JavaScript
									  | id : 중복이 없는 구분자 => 각 파일에 한개 존재
									  	=> #
									  	<a id="a"</a> ==> #a
									  	<a id="b"</a> ==> #b
									  	<a id="c"</a> ==> #c
									  | class : 중복이 가능한 구분자
									   	=> .
									   	<a class="d"></a>
									   	<a class="d"></a>
									   	<a class="d"></a>
									   	<a class="d"></a>
									   	<a class="d"></a>
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
#red{
	background-color: red;
}
.green {
	background-color: green;
}
a {
	background-color: yellow;
}
</style>
<!-- 
	내부 CSS : 파일 한개
	인라인 CSS : 태그 한개
	외부 CSS : 파일로 만듦 => 공통적으로 적용 
 -->
 
</head>
<body>
	<h1 id="red">Red</h1>
	<h1 id="blue">Blue</h1>
	<h1 class="green">Green</h1>
	<h1 id="yellow">Yellow</h1>
	<h1 class="green">Green</h1>
	<!-- block 속성 : 한줄 전체 차지(System.out.println()) , 
	inline 속성 : 글자 크기만 차지(System.out.print())
	-->
	<hr>
</body>
</html>
