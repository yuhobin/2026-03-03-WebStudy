<!-- 
	<a> : 링크 태그 => 가장 많이 등장하는 태그 => 메뉴 / 버튼 / 문자 
			1. 페이지 이동 
			2. 파일 다운로드 
			3. 전화, 이메일 연결 
			4. 상세보기 
			
			주요 속성
			1. href : 이동할 파일명 지정 
						<a href="파일명">내용<a>
			2. target : 새탭 열기 / 자체 이동
						_blank	 _self
					<a href="" target="_blank">
							   ----------------- 생략이면 _self
			3. title : 부가 설명
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<a href="http://www.daum.net">다음</a>
	<a href="http://www.naver.com" target="_blank">네이버</a>
</body>
</html>
