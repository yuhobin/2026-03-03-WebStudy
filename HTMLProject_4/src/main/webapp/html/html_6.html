<!-- 
	권장 사항
	<feildset> <legend> <label>
	<select> => 그룹
	<figure> <figcaption>
	
	<h1>, <h3>, <font>, <strong>, <br>, <hr>, <pre>
	-----------------------------------------------
	<ul>, <table>
	-----------------------------------------------
	<input>, <select>, <textarea>
	------- type=text, button, password, submit,
	 		checkbox, radio, hidden, file
	 <feildset>, <legend>, <label>, <figure>, <figcation>
	 <img>, <embed>, <a>
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<!-- 98page -->
	<select multiple="multiple">
		<optgroup label="Back-End">
			<option>자바</option>
			<option>오라클</option>
			<option>JSP</option>
			<option>Spring</option>
			<option>Spring-Boot</option>
		</optgroup>
		<optgroup label="Front-End">
			<option>HTML</option>
			<option>CSS</option>
			<option>JavaScript</option>
			<option>VueJS</option>
			<option>ReactJS</option>
		</optgroup>
		<optgroup label="SE">
			<option>Git</option>
			<option>Docker</option>
			<option>쿠바네틱스</option>
			<option>AWS</option>
			<option>Jenkins</option>
		</optgroup>
	</select>
	<hr>
	<!-- 99page -->
	<fieldset><!-- 입력창을 모은다 -->
		<legend>회원 정보</legend> <!-- 구분자 -->
		<label for=id>ID</label> <!-- id명과 for명이 일치 => 한세트가 만들어진다 -->
		<input type="text" size=20 id=id> <br>
		<label for=name>NAME</label>
		<input type="text" size=20 id=name>
	</fieldset>
	<hr>
	<figure> <!-- 이미지 + 설명 : 이미지 카드-->
		<img alt="" src="m1.jpg">
		<figcaption>이미지에 대한 설명시에 사용</figcaption>
	</figure>
</body>
</html>
